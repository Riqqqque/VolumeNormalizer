<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volume Normalizer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101114;
      --surface: #181a1f;
      --surface-raised: #20232a;
      --surface-soft: #252932;
      --line: rgba(255, 255, 255, 0.09);
      --line-strong: rgba(255, 255, 255, 0.15);
      --text: #f7f8fa;
      --muted: #9299a8;
      --muted-strong: #b8bfcb;
      --accent: #35d7ff;
      --accent-deep: #4d7cff;
      --accent-soft: rgba(53, 215, 255, 0.12);
      --success: #63e6be;
      --danger: #ff7c8e;
      --radius-xl: 20px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --shadow: 0 22px 48px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      width: 392px;
      min-height: 100%;
      background: var(--bg);
    }

    body {
      width: 392px;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      color: var(--text);
      background:
        radial-gradient(circle at 88% -8%, rgba(53, 215, 255, 0.14), transparent 34%),
        radial-gradient(circle at 4% 8%, rgba(77, 124, 255, 0.12), transparent 30%),
        var(--bg);
      font-family: "Bahnschrift", "Aptos", "Segoe UI Variable", sans-serif;
      scrollbar-color: rgba(255, 255, 255, 0.22) transparent;
      scrollbar-width: thin;
    }

    body::-webkit-scrollbar {
      width: 8px;
    }

    body::-webkit-scrollbar-thumb {
      border: 2px solid transparent;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      background-clip: padding-box;
    }

    button,
    input {
      font: inherit;
    }

    button {
      color: inherit;
    }

    .shell {
      position: relative;
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .topbar,
    .card {
      border: 1px solid var(--line);
      background: rgba(24, 26, 31, 0.94);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .topbar {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 72px;
      overflow: hidden;
      padding: 12px 14px;
      border-radius: var(--radius-xl);
    }

    .topbar::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-deep), transparent 86%);
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 11px;
    }

    .logo {
      display: grid;
      width: 44px;
      height: 44px;
      flex: 0 0 auto;
      place-items: center;
      border: 1px solid var(--line-strong);
      border-radius: 13px;
      background: linear-gradient(145deg, #2a2d33, #17191d);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.07);
    }

    .logo img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
    }

    .brand-copy {
      min-width: 0;
    }

    .kicker {
      margin-bottom: 3px;
      color: var(--accent);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      line-height: 1;
      text-transform: uppercase;
    }

    h1 {
      overflow: hidden;
      font-size: 17px;
      font-weight: 650;
      letter-spacing: -0.02em;
      line-height: 1.1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .active-pill {
      display: inline-flex;
      align-items: center;
      flex: 0 0 auto;
      gap: 7px;
      padding: 7px 9px;
      border: 1px solid rgba(99, 230, 190, 0.18);
      border-radius: 999px;
      background: rgba(99, 230, 190, 0.08);
      color: #c8ffef;
      font-size: 11px;
      font-weight: 650;
      font-variant-numeric: tabular-nums;
    }

    .active-pill::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 12px rgba(99, 230, 190, 0.7);
    }

    .card {
      border-radius: var(--radius-xl);
      padding: 15px;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      line-height: 1;
      text-transform: uppercase;
    }

    h2 {
      margin-top: 5px;
      font-size: 15px;
      font-weight: 650;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .tone-badge {
      padding: 6px 9px;
      border: 1px solid rgba(53, 215, 255, 0.18);
      border-radius: 999px;
      background: var(--accent-soft);
      color: #bcefff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .volume-row {
      display: grid;
      grid-template-columns: 112px 1fr;
      align-items: center;
      gap: 15px;
    }

    .volume-readout {
      display: flex;
      width: 112px;
      height: 76px;
      align-items: baseline;
      justify-content: center;
      overflow: hidden;
      padding: 13px 10px 10px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-lg);
      background:
        linear-gradient(145deg, rgba(53, 215, 255, 0.08), rgba(77, 124, 255, 0.05)),
        var(--surface-raised);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .volume-input {
      width: 3ch;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 40px;
      font-weight: 650;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.05em;
      line-height: 1;
      text-align: right;
    }

    .volume-input::selection {
      background: rgba(53, 215, 255, 0.3);
    }

    .percent-sign {
      margin-left: 2px;
      color: var(--muted-strong);
      font-size: 18px;
      font-weight: 650;
      line-height: 1;
    }

    .range-stack {
      display: grid;
      gap: 9px;
      min-width: 0;
    }

    .range-copy {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 10px;
      font-weight: 650;
      font-variant-numeric: tabular-nums;
    }

    .volume-slider {
      --volume-percent: 25%;
      width: 100%;
      height: 22px;
      margin: 0;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      cursor: pointer;
    }

    .volume-slider::-webkit-slider-runnable-track {
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        var(--accent) 0,
        var(--accent-deep) var(--volume-percent),
        var(--surface-soft) var(--volume-percent),
        var(--surface-soft) 100%
      );
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    .volume-slider::-moz-range-track {
      height: 8px;
      border-radius: 999px;
      background: var(--surface-soft);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    .volume-slider::-moz-range-progress {
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-deep));
    }

    .volume-slider::-webkit-slider-thumb {
      width: 20px;
      height: 20px;
      margin-top: -6px;
      border: 3px solid #f7f9fc;
      border-radius: 50%;
      appearance: none;
      -webkit-appearance: none;
      background: #17191e;
      box-shadow: 0 0 0 4px rgba(53, 215, 255, 0.12), 0 5px 12px rgba(0, 0, 0, 0.35);
    }

    .volume-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border: 3px solid #f7f9fc;
      border-radius: 50%;
      background: #17191e;
      box-shadow: 0 0 0 4px rgba(53, 215, 255, 0.12), 0 5px 12px rgba(0, 0, 0, 0.35);
    }

    .volume-slider:focus-visible::-webkit-slider-thumb {
      box-shadow: 0 0 0 4px var(--bg), 0 0 0 6px var(--accent);
    }

    .volume-slider:focus-visible::-moz-range-thumb {
      box-shadow: 0 0 0 4px var(--bg), 0 0 0 6px var(--accent);
    }

    .presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      margin-top: 13px;
    }

    .preset,
    .bulk-button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.035);
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
    }

    .preset {
      min-height: 31px;
      border-radius: 9px;
      color: var(--muted-strong);
      font-size: 11px;
      font-weight: 650;
    }

    .preset:hover,
    .bulk-button:hover {
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.07);
    }

    .preset[aria-pressed="true"] {
      border-color: rgba(53, 215, 255, 0.35);
      background: var(--accent-soft);
      color: #d8f7ff;
    }

    .preset:active,
    .bulk-button:active {
      transform: translateY(1px);
    }

    .bulk-actions {
      display: flex;
      gap: 6px;
    }

    .bulk-button {
      min-width: 42px;
      height: 28px;
      padding: 0 8px;
      border-radius: 9px;
      color: var(--muted-strong);
      font-size: 10px;
      font-weight: 700;
    }

    .bulk-button.danger:hover {
      border-color: rgba(255, 124, 142, 0.26);
      color: #ffb1bd;
    }

    .sites-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .site-toggle {
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr) 38px;
      align-items: center;
      min-height: 52px;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.025);
      transition: border-color 120ms ease, background 120ms ease, opacity 120ms ease;
    }

    .site-toggle[data-enabled="true"] {
      border-color: rgba(53, 215, 255, 0.13);
      background: linear-gradient(135deg, rgba(53, 215, 255, 0.055), rgba(77, 124, 255, 0.025));
    }

    .site-toggle[data-enabled="false"] {
      opacity: 0.62;
    }

    .site-icon {
      display: grid;
      width: 32px;
      height: 32px;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 9px;
      background: var(--surface-soft);
      color: #e8edf4;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .site-name {
      overflow: hidden;
      font-size: 11px;
      font-weight: 650;
      line-height: 1.15;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .switch {
      position: relative;
      width: 38px;
      height: 22px;
    }

    .switch input {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      margin: 0;
      opacity: 0;
      cursor: pointer;
    }

    .switch-track {
      position: absolute;
      inset: 0;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #2b2e35;
      transition: background 140ms ease, border-color 140ms ease;
    }

    .switch-track::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #d8dce3;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
      transition: transform 140ms ease, background 140ms ease;
    }

    .switch input:checked + .switch-track {
      border-color: rgba(53, 215, 255, 0.4);
      background: linear-gradient(90deg, var(--accent), var(--accent-deep));
    }

    .switch input:checked + .switch-track::after {
      transform: translateX(16px);
      background: #fff;
    }

    .switch input:focus-visible + .switch-track,
    .preset:focus-visible,
    .bulk-button:focus-visible,
    .volume-input:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px 2px;
      color: var(--muted);
      font-size: 10px;
      font-variant-numeric: tabular-nums;
    }

    .save-state {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .save-state::before {
      content: "";
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--success);
    }

    .save-state[data-state="saving"]::before {
      background: var(--accent);
      animation: pulse 900ms ease-in-out infinite;
    }

    .save-state[data-state="error"] {
      color: #ffb1bd;
    }

    .save-state[data-state="error"]::before {
      background: var(--danger);
    }

    @keyframes pulse {
      50% {
        opacity: 0.35;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo">
          <img src="icons/icon48.png" alt="">
        </div>
        <div class="brand-copy">
          <div class="kicker">Audio control</div>
          <h1>Volume Normalizer</h1>
        </div>
      </div>
      <div class="active-pill" id="enabledSitesValue" aria-live="polite">19/19</div>
    </header>

    <section class="card" aria-labelledby="targetHeading">
      <div class="card-head">
        <div>
          <div class="section-label">Master level</div>
          <h2 id="targetHeading">Output target</h2>
        </div>
        <span class="tone-badge" id="volumeTone">Balanced</span>
      </div>

      <div class="volume-row">
        <label class="volume-readout" for="volumeInput">
          <input type="text" id="volumeInput" class="volume-input" inputmode="numeric" maxlength="3" value="25" aria-label="Target volume percentage" autocomplete="off" spellcheck="false">
          <span class="percent-sign" aria-hidden="true">%</span>
        </label>

        <div class="range-stack">
          <div class="range-copy" aria-hidden="true">
            <span>Quiet</span>
            <span>Max</span>
          </div>
          <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="25" aria-label="Target volume">
        </div>
      </div>

      <div class="presets" id="presetButtons" aria-label="Volume presets">
        <button class="preset" type="button" data-volume="15" aria-pressed="false">15%</button>
        <button class="preset" type="button" data-volume="25" aria-pressed="true">25%</button>
        <button class="preset" type="button" data-volume="50" aria-pressed="false">50%</button>
        <button class="preset" type="button" data-volume="75" aria-pressed="false">75%</button>
      </div>
    </section>

    <section class="card" aria-labelledby="sitesHeading">
      <div class="card-head">
        <div>
          <div class="section-label">Site controls</div>
          <h2 id="sitesHeading">Supported players</h2>
        </div>
        <div class="bulk-actions" aria-label="Bulk site controls">
          <button class="bulk-button" id="enableAllButton" type="button">All</button>
          <button class="bulk-button danger" id="disableAllButton" type="button">None</button>
        </div>
      </div>

      <div class="sites-grid" id="sitesList"></div>
    </section>

    <footer class="footer">
      <span class="save-state" id="saveStatus" data-state="saved" aria-live="polite">Saved</span>
      <span id="versionValue"></span>
    </footer>
  </main>

  <script src="sites.js"></script>
  <script src="popup.js"></script>
</body>

</html>
