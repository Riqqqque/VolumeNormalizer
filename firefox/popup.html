<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volume Normalizer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      width: 320px;
      max-height: 500px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 20px;
      overflow-y: auto;
    }

    body::-webkit-scrollbar {
      width: 6px;
    }

    body::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }

    body::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .icon {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: #00d4ff;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      color: rgba(255, 255, 255, 0.8);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .section {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
    }

    .volume-control {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .volume-display {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .volume-input {
      width: 70px;
      font-size: 32px;
      font-weight: 700;
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #00d4ff;
      text-align: center;
      padding: 4px;
      transition: border-color 0.3s;
    }

    .volume-input:focus {
      outline: none;
      border-color: #7b2cbf;
    }

    .volume-input::-webkit-inner-spin-button,
    .volume-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .percent-sign {
      font-size: 24px;
      font-weight: 700;
      color: #7b2cbf;
    }

    .slider-container {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .slider-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      min-width: 24px;
    }

    .volume-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 8px;
      background: linear-gradient(90deg, #00d4ff 0%, #7b2cbf 100%);
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s;
    }

    .volume-slider::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    .scroll-hint {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
      margin-top: 4px;
    }

    .sites-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .site-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      transition: background 0.2s;
    }

    .site-toggle:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .site-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .site-icon {
      font-size: 12px;
      width: 24px;
      text-align: center;
      font-weight: 700;
      color: #b8d9ff;
      letter-spacing: 0.4px;
    }

    .site-name {
      font-size: 13px;
      font-weight: 500;
    }

    .toggle {
      position: relative;
      width: 42px;
      height: 24px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.2);
      transition: 0.3s;
      border-radius: 24px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    .toggle input:checked+.toggle-slider {
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
    }

    .toggle input:checked+.toggle-slider:before {
      transform: translateX(18px);
    }

    .footer {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
      margin-top: 4px;
    }
  </style>
</head>

<body>
  <div class="header">
    <span class="icon">VN</span>
    <h1>Volume Normalizer</h1>
  </div>

  <div class="section">
    <h2>Volume Level</h2>
    <div class="volume-control">
      <div class="volume-display">
        <input type="number" id="volumeInput" class="volume-input" min="0" max="100" value="25">
        <span class="percent-sign">%</span>
      </div>
      <div class="slider-container">
        <span class="slider-label">0</span>
        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="25">
        <span class="slider-label">100</span>
      </div>
      <div class="scroll-hint">Use scroll wheel or drag slider to adjust</div>
    </div>
  </div>

  <div class="section">
    <h2>Active Sites</h2>
    <div class="sites-list" id="sitesList">
    </div>
  </div>

  <div class="footer">
    Scroll on input box or use slider to adjust volume
  </div>

  <script src="popup.js"></script>
</body>

</html>
